<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Tourist Spot Review Sentiment Analyzer</title>
  <title>Submit Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="app-card app-card--compact">
      <header class="app-header">
        <h1>Share Your Review</h1>
        <p>Type your review below. It will be sent directly to the admin dashboard for analysis.</p>
      </header>

      <section class="input-panel">
        <div class="field-head">
          <label for="review-input">Your review</label>
        </div>
        <textarea id="review-input" rows="6" placeholder="Type your review here..."></textarea>

        <div class="action-row">
          <button id="submit-review-btn" class="button button--primary">Submit Review</button>
        </div>

        <p id="submit-message" class="helper-note">Your review will appear in the admin page after submission.</p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
